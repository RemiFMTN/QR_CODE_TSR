<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Modifier mon groupe</title>
  <style>
    :root {
      --bg: #f6f3ec;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; color:var(--ink); background: radial-gradient(circle at top left, #fff8ee 0%, var(--bg) 55%); }
    .container { max-width:820px; margin:40px auto; padding:0 20px 40px; }
    .card { background: var(--card); border-radius:16px; padding:24px; box-shadow:0 20px 60px rgba(15,23,42,0.08); }
    h1 { margin-top:0; font-size:28px }
    label { display:block; font-weight:600; margin-bottom:8px }
    input { width:100%; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; margin-bottom:14px; font-size:14px }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px }
    .member { margin:6px 0; padding:8px; border:1px solid #ddd; display:flex; justify-content:space-between; align-items:center }
    .actions { display:flex; gap:12px; align-items:center }
    .primary { background:var(--accent); color:white; border:none; border-radius:12px; padding:12px 18px; cursor:pointer }
    .secondary { background:#ecfeff; border:1px solid #a5f3fc; color:#0e7490; border-radius:12px; padding:10px 16px; cursor:pointer }
    .muted { color:var(--muted) }
    .hidden { display:none }
    @media (max-width:720px) { .row, .member { grid-template-columns:1fr } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Modifier votre groupe</h1>
      <p class="muted">Accédez à la modification en fournissant votre e-mail et le code de secours.</p>

      <div id="lookup">
        <div class="row">
          <div>
            <label>Adresse e-mail du créateur</label>
            <input id="creatorEmail" type="email" placeholder="creator@example.com" />
          </div>
          <div>
            <label>Code de secours</label>
            <input id="fallbackCode" type="text" placeholder="e.g. 442259" />
          </div>
        </div>
        <div style="margin-top:12px" class="actions">
          <button id="btnLookup" class="primary">Vérifier et modifier</button>
        </div>
        <div id="lookupError" style="color:red; margin-top:8px"></div>
      </div>

      <div id="editor" class="hidden">
        <h2>Groupe</h2>
        <label>Nom du groupe</label>
        <input id="groupName" type="text" />

        <div class="row">
          <div>
            <label>Nom du créateur</label>
            <input id="creatorName" type="text" />
          </div>
          <div>
            <label class="muted">QR Token (lecture seule)</label>
            <input id="qrToken" type="text" readonly />
          </div>
        </div>

        <div style="margin-top:8px" class="actions">
          <button id="btnSaveGroup" class="secondary">Enregistrer les modifications du groupe</button>
          <a id="pdfLink" class="secondary" href="#" target="_blank">Télécharger le PDF</a>
        </div>

        <h3 style="margin-top:18px">Membres</h3>
        <div id="membersList"></div>

        <h4>Ajouter un membre</h4>
        <label>Nom complet</label>
        <input id="newMemberName" type="text" />
        <label>Email (optionnel)</label>
        <input id="newMemberEmail" type="email" />
        <div style="margin-top:8px" class="actions"><button id="btnAddMember" class="primary">Ajouter</button></div>
      </div>
    </div>
  </div>

  <script>
    let currentGroup = null;

    const el = (id) => document.getElementById(id);
    const showError = (text) => { el('lookupError').textContent = text || ''; };

    async function doLookup(creatorEmail, fallbackCode) {
      showError('');
      if (!creatorEmail || !fallbackCode) return showError('Email et code requis');
      try {
        const res = await fetch('/public/groups/lookup', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ creatorEmail, fallbackCode })
        });
        if (!res.ok) {
          const err = await res.json().catch(()=>({error:'Échec'}));
          return showError(err.error || 'Groupe non trouvé');
        }
        const data = await res.json();
        currentGroup = data.group;
        renderEditor(data);
      } catch (err) {
        console.error(err);
        showError('Erreur réseau');
      }
    }

    document.getElementById('btnLookup').addEventListener('click', () => {
      doLookup(el('creatorEmail').value.trim(), el('fallbackCode').value.trim());
    });

    function renderEditor(data) {
      el('lookup').classList.add('hidden');
      el('editor').classList.remove('hidden');
      el('groupName').value = data.group.name || '';
      el('creatorName').value = data.group.creatorName || '';
      el('qrToken').value = data.group.qrToken || '';
      el('pdfLink').href = '/public/registration.pdf?token=' + encodeURIComponent(data.group.qrToken);

      const list = el('membersList');
      list.innerHTML = '';
      (data.members||[]).forEach(m => {
        const div = document.createElement('div');
        div.className = 'member';
        const left = document.createElement('div');
        left.innerHTML = '<strong>' + escapeHtml(m.full_name || '') + '</strong>' + (m.email ? ('<div class="muted">' + escapeHtml(m.email) + '</div>') : '');
        const del = document.createElement('button');
        del.className = 'secondary';
        del.textContent = 'Supprimer';
        del.addEventListener('click', () => deleteMember(m.id));
        div.appendChild(left);
        div.appendChild(del);
        list.appendChild(div);
      });
    }

    el('btnSaveGroup').addEventListener('click', async () => {
      const name = el('groupName').value.trim();
      const creatorName = el('creatorName').value.trim();
      try {
        const res = await fetch('/public/groups/' + encodeURIComponent(currentGroup.id), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, creatorName })
        });
        if (!res.ok) {
          const e = await res.json().catch(()=>({ error: 'Erreur' }));
          return alert('Erreur: ' + (e.error || 'Échec'));
        }
        const data = await res.json();
        currentGroup = data.group;
        alert('Groupe mis à jour');
      } catch (err) {
        console.error(err);
        alert('Erreur réseau');
      }
    });

    el('btnAddMember').addEventListener('click', async () => {
      const fullName = el('newMemberName').value.trim();
      const email = el('newMemberEmail').value.trim();
      if (!fullName) return alert('Nom du membre requis');
      try {
        const res = await fetch('/public/groups/' + encodeURIComponent(currentGroup.id) + '/members', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, email })
        });
        if (!res.ok) { const e = await res.json().catch(()=>({ error:'Erreur' })); return alert(e.error || 'Échec'); }
        await refreshGroup();
        el('newMemberName').value = ''; el('newMemberEmail').value = '';
      } catch (err) { console.error(err); alert('Erreur réseau'); }
    });

    async function deleteMember(memberId) {
      if (!confirm('Supprimer ce membre ?')) return;
      try {
        const res = await fetch('/public/groups/' + encodeURIComponent(currentGroup.id) + '/members/' + encodeURIComponent(memberId), { method: 'DELETE' });
        if (!res.ok) { const e = await res.json().catch(()=>({ error:'Erreur' })); return alert(e.error || 'Échec'); }
        await refreshGroup();
      } catch (err) { console.error(err); alert('Erreur réseau'); }
    }

    async function refreshGroup() {
      try {
        const res = await fetch('/public/groups/lookup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ creatorEmail: el('creatorEmail').value.trim(), fallbackCode: el('fallbackCode').value.trim() }) });
        if (!res.ok) return alert('Impossible de rafraîchir');
        const data = await res.json();
        currentGroup = data.group;
        renderEditor(data);
      } catch (err) { console.error(err); }
    }

    // prefills from query params and auto-lookup
    (function() {
      const params = new URLSearchParams(window.location.search);
      const email = params.get('creatorEmail') || '';
      const fallback = params.get('fallbackCode') || '';
      if (email) el('creatorEmail').value = decodeURIComponent(email);
      if (fallback) el('fallbackCode').value = decodeURIComponent(fallback);
      if (email && fallback) {
        // small timeout to allow UI render
        setTimeout(() => doLookup(email, fallback), 200);
      }
    })();

    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]); }
  </script>
</body>
</html>
