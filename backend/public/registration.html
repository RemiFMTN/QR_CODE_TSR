<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TSR - Fête de l'industrie</title>
    <style>
      :root {
        --bg: #f6f3ec;
        --card: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top left, #fff8ee 0%, var(--bg) 55%);
      }

      .container {
        max-width: 820px;
        margin: 40px auto;
        padding: 0 20px 40px;
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }

      .intro {
        display: flex;
        gap: 18px;
        align-items: center;
        margin-bottom: 20px;
      }

      .logo {
        width: 150px;
        height: 150px;
        flex: 0 0 150px;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        padding: 10px;
        object-fit: contain;
      }

      .intro-text h1 {
        margin-bottom: 8px;
      }

      .intro-text p {
        margin: 0 0 8px;
      }

      h1 {
        margin-top: 0;
        font-size: 28px;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        margin-bottom: 14px;
        font-size: 14px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .member-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 10px;
      }

      .member-row button {
        background: #fee2e2;
        border: 1px solid #fecaca;
        color: #991b1b;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
      }

      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .actions a {
        text-decoration: none;
      }

      .primary {
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px 18px;
        cursor: pointer;
      }

      .secondary {
        background: #ecfeff;
        border: 1px solid #a5f3fc;
        color: #0e7490;
        border-radius: 12px;
        padding: 10px 16px;
        cursor: pointer;
      }

      .result {
        margin-top: 20px;
        padding: 16px;
        background: #f0fdf4;
        border-radius: 12px;
        border: 1px solid #bbf7d0;
      }

      .qr-box {
        margin-top: 12px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .qr-box img {
        width: 180px;
        height: 180px;
        border-radius: 12px;
        background: white;
        padding: 8px;
        border: 1px solid #e5e7eb;
        object-fit: contain;
      }

      .error {
        margin-top: 16px;
        padding: 12px;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 10px;
        color: #991b1b;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .row,
        .member-row {
          grid-template-columns: 1fr;
        }

        .member-row button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="intro">
          <img class="logo" src="LOGO-HD-TSR-PASTILLE.png" alt="Logo TSR" />
          <div class="intro-text">
            <h1>Inscription à la Garden Party</h1>
            <p>Créez votre groupe et ajoutez tous les membres en un seul clic.</p>
            <p class="muted">Pensez à transmettre le QR code aux membres de votre groupe.</p>
          </div>
        </div>

        <form id="registration-form">
          <label for="groupName">Entreprise</label>
          <input id="groupName" name="groupName" required />

          <div class="row">
            <div>
              <label for="creatorName">Nom - Prénom</label>
              <input id="creatorName" name="creatorName" required />
            </div>
            <div>
              <label for="creatorEmail">Adresse mail</label>
              <input id="creatorEmail" name="creatorEmail" type="email" required />
            </div>
          </div>

          <label>Invités</label>
          <div id="members"></div>

          <div class="actions">
            <button type="button" class="secondary" id="add-member">Ajouter un invité</button>
            <button type="submit" class="primary">Soumettre l'inscription</button>
          </div>
        </form>

        <div id="result" class="result" style="display: none;"></div>
        <div id="error" class="error" style="display: none;"></div>
      </div>
    </div>

    <script>
      const membersContainer = document.getElementById("members");
      const addMemberButton = document.getElementById("add-member");
      const form = document.getElementById("registration-form");
      const result = document.getElementById("result");
      const error = document.getElementById("error");

      const addMemberRow = (name = "", email = "", isCreator = false) => {
        const row = document.createElement("div");
        row.className = "member-row";

        const nameInput = document.createElement("input");
        nameInput.placeholder = "Nom complet de l'invité";
        nameInput.value = name;
        nameInput.required = true;

        const emailInput = document.createElement("input");
        emailInput.placeholder = "Email (recommandé pour l'envoi du QR code)";
        emailInput.type = "email";
        emailInput.value = email;

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.textContent = "Supprimer";
        removeButton.addEventListener("click", () => {
          if (isCreator) return; // don't allow removing the creator row
          row.remove();
        });

        row.appendChild(nameInput);
        row.appendChild(emailInput);
        row.appendChild(removeButton);
        membersContainer.appendChild(row);

        // If this row represents the creator, keep it synced with creator inputs
        if (isCreator) {
          // update member row when creator fields change
          const creatorNameInput = document.getElementById('creatorName');
          const creatorEmailInput = document.getElementById('creatorEmail');
          const sync = () => {
            nameInput.value = creatorNameInput.value.trim();
            emailInput.value = creatorEmailInput.value.trim();
          };
          creatorNameInput.addEventListener('input', sync);
          creatorEmailInput.addEventListener('input', sync);
          // initialize remove button style to indicate non-removable
          removeButton.style.opacity = '0.5';
          removeButton.style.cursor = 'not-allowed';
        }
      };

      addMemberButton.addEventListener("click", () => addMemberRow());

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        result.style.display = "none";
        error.style.display = "none";

        const members = Array.from(membersContainer.children).map((row) => {
          const inputs = row.querySelectorAll("input");
          return {
            fullName: inputs[0].value.trim(),
            email: inputs[1].value.trim()
          };
        });

        const payload = {
          groupName: document.getElementById("groupName").value.trim(),
          creatorName: document.getElementById("creatorName").value.trim(),
          creatorEmail: document.getElementById("creatorEmail").value.trim(),
          members
        };

        try {
          const response = await fetch("/public/groups", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Registration failed");
          }

          const title = data.alreadyExists
            ? "<strong>Le groupe existe déjà</strong><br /><span class=\"muted\">Vous avez déjà un groupe enregistré avec cette adresse mail.</span>"
            : "<strong>Enregistrement confirmé !</strong>";

          result.innerHTML = `
            ${title}<br />
            Groupe : ${data.group.name}<br />
            Code QR : ${data.group.qrToken}<br />
            Code de secours : ${data.group.fallbackCode}
            <div class="qr-box">
              <img id="qr-image" alt="Code QR" />
              <div class="muted">Scannez ce QR à l'entrée. Nous vous conseillons fortement de télécharger le PDF, il peut vous servir à modifier votre groupe plus tard.</div>
            </div>
            <div class="actions" style="margin-top: 12px;">
                <a class="secondary" id="download-pdf" target="_blank">Télécharger le PDF</a>
                <a class="secondary" id="edit-group" target="_blank" style="margin-left:8px;">Modifier votre groupe</a>
              </div>
          `;
          const image = document.getElementById("qr-image");
          image.src = `/public/qr?value=${encodeURIComponent(data.group.qrToken)}`;
          const pdfLink = document.getElementById("download-pdf");
          pdfLink.href = `/public/registration.pdf?token=${encodeURIComponent(data.group.qrToken)}`;
          const editLink = document.getElementById('edit-group');
          const params = new URLSearchParams({ creatorEmail: data.group.creatorEmail || document.getElementById('creatorEmail').value.trim(), fallbackCode: data.group.fallbackCode });
          editLink.href = '/public/edit.html?' + params.toString();
          result.style.display = "block";
        } catch (err) {
          error.textContent = err.message;
          error.style.display = "block";
        }
      });

      // add first member row linked to creator by default
      addMemberRow(document.getElementById('creatorName').value.trim(), document.getElementById('creatorEmail').value.trim(), true);
    </script>
  </body>
</html>
